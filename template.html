<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>lejtzen/lejtzen</title>
    <meta name="description" content="lejtzen's personal website" />
    <link rel="canonical" href="https://lejtzen.dev" />
    <link
      rel="preload"
      as="image"
      href="https://ask.lejtzendesign.se/assets/static/profile.a4a3e80.ba6b55d9d87a2039fdc1deb8925ed80a.jpg"
    />
    <style>
      @keyframes fadeIn {
        0% {
          opacity: 0;
          transform: translateY(1rem);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html {
        -webkit-text-size-adjust: 100%;
        -moz-text-size-adjust: 100%;
        text-size-adjust: 100%;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        -webkit-tap-highlight-color: transparent;
        background-color: #000;
      }

      body {
        font-family:
          -apple-system,
          BlinkMacSystemFont,
          Segoe UI,
          Roboto,
          Helvetica,
          Arial,
          sans-serif,
          Apple Color Emoji,
          Segoe UI Emoji,
          Segoe UI Symbol;
        font-size: 16px;
        color: rgba(255, 255, 255, 1);
        padding: 0;
        margin: 0;
      }

      .wrap {
        overflow: hidden;
        min-height: 100svh;
        display: flex;
        flex-direction: column;
      }

      a {
        color: #0091ff;
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }

      header,
      main,
      footer {
        width: 100%;
        padding-left: 2rem;
        padding-right: 2rem;
      }

      header,
      footer {
        padding-top: 2rem;
        padding-bottom: 2rem;
      }

      header {
        position: sticky;
        z-index: 1;
        top: 0;
      }

      figure {
        display: block;
        padding: 0;
        margin: 0;
        text-align: center;
      }

      figure img {
        height: 3.75rem;
        width: 3.75rem;
        object-fit: cover;
        border-radius: 9999px;
        display: block;
        margin: 0 auto;
      }

      figure figcaption {
        position: relative;
        background-color: rgba(255, 255, 255, 0.06);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.06);
        padding: 0.25rem 0.75rem;
        border-radius: 9999px;
        display: inline-block;
        margin-top: -0.375rem;
        font-weight: 500;
      }

      main {
        flex-grow: 1;
        max-width: 60ch;
        margin: 0 auto;
      }

      main * {
        margin: 0;
        padding: 0;
        font-family: inherit;
        font-size: inherit;
        font-weight: inherit;
        list-style: none;
      }

      main > * {
        background-color: rgba(255, 255, 255, 0.12);
        border-radius: 1.125rem;
        padding: 0.5rem 0.75rem;
        width: fit-content;
        animation: fadeIn 400ms ease-out both;
      }

      main > * + * {
        margin-top: 0.5rem;
      }

      main * ul,
      main * ol {
        padding-left: 0.5rem;
      }

      main a {
        text-decoration: underline;
      }

      main table {
        font-variant-numeric: tabular-nums;
      }

      main table th,
      main table td {
        vertical-align: top;
      }

      main table thead {
        color: rgba(255, 255, 255, 0.5);
      }

      main table tr * + * {
        padding-left: 0.5rem;
      }

      footer {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        color: rgba(255, 255, 255, 0.7);
        font-size: 0.75rem;
        animation: fadeIn 400ms ease-out both;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <figure>
          <img
            src="https://ask.lejtzendesign.se/assets/static/profile.a4a3e80.ba6b55d9d87a2039fdc1deb8925ed80a.jpg"
            alt="A profile picture of Vincent Lejtzén"
            loading="eager"
            fetchpriority="high"
            decoding="sync"
          />
          <figcaption>Vincent Lejtzén 👨🏼‍💻</figcaption>
        </figure>
      </header>

      <main>{content}</main>

      <footer>
        <div>Copyright © {year} Vincent Lejtzén. All rights reserved.</div>
        <div>
          Build at {date} using
          <a href="https://github.com/lejtzen/lejtzen">lejtzen/lejtzen</a>
        </div>
      </footer>
    </div>

    <script>
      (function () {
        const selectors = ["main > *", "footer"];

        document.querySelectorAll(selectors.join(", ")).forEach((el, index) => {
          el.style.animationDelay = `${200 * index}ms`;
        });
      })();
    </script>
  </body>
</html>
